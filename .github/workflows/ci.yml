name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify modules
        run: go mod verify
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Check installer
        run: shellcheck install.sh
